[socks5]
listen = "127.0.0.1:6080"
# log_level: error, warn, info, debug, trace (default: debug)
# log_level = "info"
# auto_reconnect: auto reconnect on VPN disconnect (default: true)
# auto_reconnect = false

[openvpn]
ovpn_file = "/path/to/client.ovpn"
username = "myuser"

# password: plain text password
# password_script: command + args to run; stdout is used as the password
# if both are set, password_script takes precedence
password = "mypassword"
# password_script = ["bash", "/path/to/get-password.sh"]
